services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pokemon-battle-backend
    working_dir: /var/www/html
    volumes:
      - ./backend/src:/var/www/html
    ports:
      - "8000:8000"
    networks:
      - pokemon-battle-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pokemon-battle-frontend
    working_dir: /app
    volumes:
      - ./frontend/src:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pokemon-battle-network

networks:
  pokemon-battle-network:
    driver: bridge

volumes:
  frontend_node_modules: